<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Crumb and Crust</title>
  <link rel="icon" type="images/jpeg" href="assets/logo.jpeg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="d-flex">
    <!-- Sidebar Toggle (Mobile Only) -->
    <button class="btn btn-primary-custom d-lg-none position-fixed bottom-0 start-0 m-3 rounded-circle shadow-lg z-3" 
            onclick="document.querySelector('.admin-sidebar').classList.toggle('show')" 
            style="width: 50px; height: 50px;">
      ☰
    </button>

    <!-- Sidebar -->
    <div class="admin-sidebar p-4 d-flex flex-column" style="width: 280px;">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="text-primary-custom fw-bold mb-0">Crumb & Crust</h3>
        <button class="btn-close d-lg-none" onclick="document.querySelector('.admin-sidebar').classList.remove('show')"></button>
      </div>
      <ul class="nav nav-pills flex-column mb-auto gap-2">
        <li class="nav-item">
          <a href="#" class="nav-link active bg-white text-dark fw-bold shadow-sm">
            📦 Daftar Pesanan
          </a>
        </li>
      </ul>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1 bg-light p-3 p-md-5" style="min-height: 100vh; overflow-x: hidden;">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark fs-4 fs-md-2">Daftar Pesanan Masuk</h2>
      </div>

      <!-- Stats -->
      <div class="row g-4 mb-4">
        <div class="col-md-6">
          <div class="card border-0 shadow-sm rounded-4 p-4">
            <p class="text-muted mb-1">Total Pesanan</p>
            <h2 class="text-primary-custom fw-bold mb-0" id="total-orders">0</h2>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card border-0 shadow-sm rounded-4 p-4">
            <p class="text-muted mb-1">Total Pendapatan</p>
            <h2 class="text-primary-custom fw-bold mb-0" id="total-revenue">Rp 0</h2>
          </div>
        </div>
      </div>

      <!-- Monthly Sales Section -->
      <div class="row g-4 mb-4">
        <div class="col-lg-8">
          <div class="card border-0 shadow-sm rounded-4 p-4">
            <h5 class="fw-bold mb-4 border-bottom pb-3">Grafik Penjualan Bulanan</h5>
            <div style="height: 300px;">
              <canvas id="salesChart"></canvas>
            </div>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="card border-0 shadow-sm rounded-4 p-4 h-100">
            <h5 class="fw-bold mb-4 border-bottom pb-3">Ringkasan Bulanan</h5>
            <div class="table-responsive">
              <table class="table table-sm table-hover align-middle mb-0 text-center">
                <thead class="bg-light">
                  <tr>
                    <th>Bulan</th>
                    <th>Total</th>
                  </tr>
                </thead>
                <tbody id="monthly-sales-body">
                  <!-- Monthly sales data injected here -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- Table -->
      <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="bg-white">
              <tr>
                <th class="px-4 py-3">ID Pesanan</th>
                <th class="py-3">Pelanggan</th>
                <th class="py-3">Item</th>
                <th class="py-3">Total Biaya</th>
                <th class="py-3">Status</th>
                <th class="py-3 text-center">Aksi</th>
              </tr>
            </thead>
            <tbody id="orders-table-body" class="bg-white border-top-0">
              <tr>
                <td colspan="6" class="text-center py-4 text-muted">Memuat data pesanan...</td>
              </tr>
            </tbody>
          </table>
        </div>
        <!-- Pagination -->
        <div class="bg-white px-4 py-3 border-top d-flex justify-content-between align-items-center">
          <div class="text-muted small">
            Menampilkan <span id="pagination-info">0 - 0</span> dari <span id="pagination-total">0</span> pesanan
          </div>
          <div class="btn-group shadow-sm">
            <button class="btn btn-sm btn-outline-secondary" id="prev-page">Sebelumnya</button>
            <button class="btn btn-sm btn-outline-secondary" id="next-page">Berikutnya</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal fade" id="orderDetailModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 rounded-4 shadow">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold">Detail Pesanan</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4" id="order-detail-content">
          <!-- Detail content injected here -->
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/db.js"></script>
  <script src="js/admin.js"></script>
</body>

</html>
